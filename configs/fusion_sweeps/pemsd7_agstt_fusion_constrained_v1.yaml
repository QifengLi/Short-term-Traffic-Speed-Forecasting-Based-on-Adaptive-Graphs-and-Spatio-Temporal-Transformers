dataset:
  name: pemsd7_228
  data_path: data/pemsd7_228.npz
  adj_path: data/pemsd7_228_adj.npy
  key: data
  seq_len: 12
  pred_len: 12
  feature_idx: 0
  train_ratio: 0.6
  val_ratio: 0.2
  num_workers: 0
  max_timesteps: 4032
  null_val: null
  strict_adj_check: true

experiment:
  name: pemsd7_agstt_fusion_constrained_v1

model:
  name: agstt
  d_model: 32
  ff_hidden: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  gcn_order: 2
  use_static_graph: true
  use_adaptive_graph: true
  use_dynamic_graph: true
  fusion_temperature: 1.0
  min_static_coeff: 0.50
  adaptive_topk: 16
  dynamic_topk: 32
  init_weight_static: 2.0
  init_weight_adaptive: 0.5
  init_weight_dynamic: 1.0

training:
  seed: 42
  batch_size: 32
  epochs: 6
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  device: auto
  log_interval: 100
  checkpoint_dir: checkpoints

output:
  save_predictions: true
  prediction_path: outputs/fusion_sweeps/pemsd7_agstt_fusion_constrained_v1_predictions.npz
  save_metrics: true
  metrics_path: outputs/fusion_sweeps/pemsd7_agstt_fusion_constrained_v1_metrics.json
