dataset:
  name: metr_la
  data_path: data/metr_la.npz
  adj_path: data/metr_la_adj.npy
  key: data
  seq_len: 12
  pred_len: 12
  feature_idx: 0
  train_ratio: 0.7
  val_ratio: 0.1
  num_workers: 0
  max_timesteps: 4032
  null_val: 0.0
  strict_adj_check: true

experiment:
  name: metr_la_agstt_no_adaptive

model:
  name: agstt
  d_model: 32
  ff_hidden: 64
  num_heads: 4
  num_layers: 2
  dropout: 0.1
  gcn_order: 2
  use_static_graph: true
  use_adaptive_graph: false
  use_dynamic_graph: true

training:
  seed: 42
  batch_size: 32
  epochs: 6
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  device: auto
  log_interval: 100
  checkpoint_dir: checkpoints

output:
  save_predictions: true
  prediction_path: outputs/improvements/metr_la_agstt_no_adaptive_predictions.npz
  save_metrics: true
  metrics_path: outputs/improvements/metr_la_agstt_no_adaptive_metrics.json
